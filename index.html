<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Софья & Артём — Свадьба</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #f5f1e8, #e8eadf);
      color: #4a4a4a;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 60px 20px;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      color: #6b705c;
      margin-bottom: 10px;
      animation: slideDown 1s ease;
    }

    h2 {
      font-weight: 300;
      margin-bottom: 40px;
      animation: fadeIn 2s ease;
    }

    .date {
      font-size: 34px;
      margin: 30px 0;
      color: #6b705c;
      animation: fadeIn 2.5s ease;
    }

    .block {
      margin: 30px 0;
      padding: 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      animation: fadeUp 1.5s ease;
    }

    .time {
      font-size: 26px;
      font-weight: bold;
      color: #6b705c;
    }

    .divider {
      width: 60px;
      height: 2px;
      background-color: #6b705c;
      margin: 30px auto;
      opacity: 0.5;
    }

    .footer {
      margin-top: 50px;
      font-style: italic;
      animation: fadeIn 3s ease;
    }

    .timer {
      font-size: 20px;
      margin-top: 20px;
      color: #6b705c;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Софья & Артём</h1>
    <h2>Приглашаем вас стать частью самого важного дня в нашей жизни</h2>

    <div class="date">22.08.2026</div>

    <div class="timer" id="timer"></div>

    <div class="divider"></div>

    <div class="block">
      <div class="time">11:00</div>
      <div>Регистрация брака</div>
      <div>ЗАГС Центрального района</div>
      <div>г. Волгоград</div>
    </div>

    <div class="block">
      <div class="time">15:00</div>
      <div>Праздничный банкет</div>
      <div>Ресторан «Лондон»</div>
    </div>

    <div class="footer">
      С нетерпением ждём встречи с вами ✨
    </div>
  </div>

  <script>
    const weddingDate = new Date("2026-08-22T11:00:00");
    const timerEl = document.getElementById("timer");

    function updateTimer() {
      const now = new Date();
      const diff = weddingDate - now;

      if (diff <= 0) {
        timerEl.innerHTML = "Этот день настал 💛";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);

      timerEl.innerHTML = `До свадьбы осталось: ${days} дн. ${hours} ч. ${minutes} мин.`;
    }

    setInterval(updateTimer, 1000);
    updateTimer();
  </script>
</body>
</html>
